version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    hostname: db
    restart: always
    environment:
      # Docker necesita estas variables específicas para configurar MySQL
      MYSQL_DATABASE: ${BD_NOMBRE}
      MYSQL_ROOT_PASSWORD: ${BD_CLAVE}
    ports:
      - "${BD_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init_db:/docker-entrypoint-initdb.d

  app:
    build: .
    container_name: node_app
    restart: on-failure
    ports:
      - "${APP_PORT:-4800}:4800"
    environment:
      # Aquí inyectamos tus variables exactas al contenedor de Node
      - BD_NOMBRE=${BD_NOMBRE}
      - BD_USUARIO=${BD_USUARIO}
      - BD_CLAVE=${BD_CLAVE}
      - BD_DIALEC=${BD_DIALEC}
      - BD_HOST=${BD_HOST}
      - BD_PORT=${BD_PORT}
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db_data: